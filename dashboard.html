<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
    
    /* Card Style: Full Color & Mungil */
    .card-vibrant { border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; color: white; transition: 0.3s; }
    .card-vibrant:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .icon-box { width: 35px; height: 35px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    
    /* Warna Solid Dashboard */
    .bg-main { background: #0f172a; } /* Slate Dark */
    .bg-blue-solid { background: #2563eb; }
    .bg-pink-solid { background: #db2777; }
    .bg-cyan-solid { background: #0891b2; }
    .bg-amber-solid { background: #d97706; }
    .bg-indigo-solid { background: #4f46e5; }

    /* Tabel & Typo */
    .table-pro thead { background: #0f172a; color: #fff; }
    .table-pro th { padding: 10px; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    .table-pro td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; font-size: 10px; font-weight: 700; }
    
    .smp-item-mini { border-radius: 10px; padding: 6px 12px; background: white; border: 1px solid #e2e8f0; font-size: 10px; display: flex; justify-content: space-between; }
  </style>
</head>
<body class="p-4 md:p-6">

  <div class="max-w-[1400px] mx-auto">
    <div class="bg-white p-4 mb-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-center border-b-4 border-slate-900">
      <div class="flex items-center gap-3">
        <div class="bg-slate-900 text-white p-2.5 rounded-xl"><i class="fas fa-university text-lg"></i></div>
        <div>
          <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest leading-none">REKAP DATA PENDAFTAR</h1>
          <h2 class="text-lg font-extrabold uppercase text-slate-900 leading-tight">SPMB SMKS SANJAYA BAJAWA 2026</h2>
        </div>
      </div>
      <button onclick="loadData()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black flex items-center gap-2 hover:bg-blue-600 transition">
        <i class="fas fa-sync-alt" id="syncIcon"></i> REFRESH
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="card-vibrant bg-main">
        <div class="icon-box"><i class="fas fa-users"></i></div>
        <div><p class="text-[8px] font-bold uppercase opacity-80">Total Pendaftar</p><h2 id="grandTotal" class="text-2xl font-black">0</h2></div>
      </div>
      <div class="card-vibrant bg-blue-solid">
        <div class="icon-box"><i class="fas fa-mars"></i></div>
        <div><p class="text-[8px] font-bold uppercase opacity-80">Siswa (L)</p><h2 id="grandL" class="text-2xl font-black">0</h2></div>
      </div>
      <div class="card-vibrant bg-pink-solid">
        <div class="icon-box"><i class="fas fa-venus"></i></div>
        <div><p class="text-[8px] font-bold uppercase opacity-80">Siswi (P)</p><h2 id="grandP" class="text-2xl font-black">0</h2></div>
      </div>
    </div>

    <div class="mb-6">
      <div id="jurusanRankContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <p class="text-[9px] font-black text-slate-400 uppercase mb-3 italic">Gender Analytics</p>
        <div class="h-56"><canvas id="chartSplit"></canvas></div>
      </div>
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <p class="text-[9px] font-black text-slate-400 uppercase mb-3 italic text-center">Data Agama</p>
        <div class="h-56"><canvas id="chartAgama"></canvas></div>
      </div>
    </div>

    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 mb-6">
      <div class="p-3 bg-slate-900"><h3 class="text-[9px] font-black text-white uppercase italic tracking-widest text-center">10 Pendaftar Terbaru melalui URL csv</h3></div>
      <div class="overflow-x-auto">
        <table class="table-pro w-full text-left">
          <thead><tr><th>KODE</th><th>NAMA SISWA</th><th>JURUSAN</th><th>ASAL SMP</th><th>WAKTU</th></tr></thead>
          <tbody id="recentTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="bg-white p-5 rounded-2xl lg:col-span-2 shadow-sm border border-slate-200">
        <h3 class="text-[9px] font-black text-slate-400 uppercase mb-3 border-b pb-2"><i class="fas fa-list-ol mr-2"></i>Top 10 Asal SMP/MTs</h3>
        <div id="smpStats" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center">
        <h3 class="text-[9px] font-black text-slate-400 uppercase mb-3 border-b pb-2">Sebaran Usia</h3>
        <div id="usiaContainer" class="flex flex-wrap gap-2 justify-center"></div>
      </div>
    </div>

    <footer class="mt-8 mb-4 text-center">
      <div class="inline-block bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-lg">
        <p class="text-[10px] font-bold uppercase tracking-widest italic">©ally R. 2026 Dashboard SPMB</p>
        <p class="text-[8px] opacity-60 mt-1">082236008339</p>
      </div>
    </footer>
  </div>

  <script>
    let charts = {};
    function initCharts() {
      const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { font: { size: 8, weight: 'bold' } } } } };
      charts.split = new Chart(document.getElementById('chartSplit'), {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'L', backgroundColor: '#0f172a', data: [] }, { label: 'P', backgroundColor: '#db2777', data: [] }] },
        options: opt
      });
      charts.agama = new Chart(document.getElementById('chartAgama'), {
        type: 'doughnut',
        data: { labels: [], datasets: [{ backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], data: [] }] },
        options: { ...opt, cutout: '80%' }
      });
    }

    function loadData() {
      const icon = document.getElementById('syncIcon');
      icon.classList.add('fa-spin');
      google.script.run.withSuccessHandler(data => {
        updateUI(data);
        icon.classList.remove('fa-spin');
      }).getData();
    }

    function updateUI(data) {
      document.getElementById('grandTotal').innerText = data.total;
      document.getElementById('grandL').innerText = data.l;
      document.getElementById('grandP').innerText = data.p;

      const colors = ['bg-indigo-solid', 'bg-cyan-solid', 'bg-amber-solid', 'bg-slate-700'];
      const sortedJurusan = Object.entries(data.jurusanData).sort((a, b) => b[1].total - a[1].total);
      document.getElementById('jurusanRankContainer').innerHTML = sortedJurusan.map(([name, val], index) => `
        <div class="card-vibrant ${colors[index] || 'bg-slate-500'}">
          <div class="icon-box"><i class="fas fa-graduation-cap"></i></div>
          <div>
            <p class="text-[7px] font-black uppercase opacity-70">RANK ${index + 1}</p>
            <h4 class="text-[10px] font-extrabold uppercase truncate max-w-[80px]">${name}</h4>
            <p class="text-xl font-black">${val.total}</p>
          </div>
        </div>`).join('');

      const top10SMP = Object.entries(data.smp).sort((a,b) => b[1] - a[1]).slice(0, 10);
      document.getElementById('smpStats').innerHTML = top10SMP.map(([name, count], index) => `
        <div class="smp-item-mini">
          <span class="font-bold uppercase truncate max-w-[140px] tracking-tighter"><span class="text-blue-600">#${index+1}</span> ${name}</span>
          <span class="font-black text-slate-900 ml-2">${count}</span>
        </div>`).join('');

      document.getElementById('recentTableBody').innerHTML = data.recentStudents.map(s => `
        <tr>
          <td class="text-slate-400 font-medium">#${s.kode}</td>
          <td class="uppercase text-slate-800">${s.nama}</td>
          <td><span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[8px] font-black uppercase">${s.jurusan}</span></td>
          <td class="uppercase text-slate-500 font-medium">${s.smp}</td>
          <td class="text-slate-400">${s.waktu}</td>
        </tr>`).join('');

      const sortedUsia = Object.entries(data.usia).sort((a,b) => parseInt(a[0]) - parseInt(b[0]));
      document.getElementById('usiaContainer').innerHTML = sortedUsia.map(([k,v]) => `
        <div class="flex flex-col items-center bg-slate-100 p-2 rounded-lg min-w-[50px]">
          <span class="text-[7px] font-black text-slate-400 uppercase">${k}</span>
          <span class="text-xs font-black text-slate-900">${v}</span>
        </div>`).join('');

      charts.split.data.labels = sortedJurusan.map(x => x[0]);
      charts.split.data.datasets[0].data = sortedJurusan.map(x => x[1].l);
      charts.split.data.datasets[1].data = sortedJurusan.map(x => x[1].p);
      charts.split.update();
      charts.agama.data.labels = Object.keys(data.agama);
      charts.agama.data.datasets[0].data = Object.values(data.agama);
      charts.agama.update();
    }
    window.onload = () => { initCharts(); loadData(); };
  </script>
</body>
</html>
